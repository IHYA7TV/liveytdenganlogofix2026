name: Live CCTV Fixx Juni 2026

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: '1. Link .m3u8 (Video)'
        required: true
      audio_url:
        description: '2. Link YouTube (Audio)'
        required: true
      kunci_rtmp:
        description: '3. Stream Key YouTube'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (FFmpeg & yt-dlp Nightly)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 4. Jalankan Relay Streaming
        env:
          YT_COOKIES_DATA: ${{ secrets.YT_COOKIES }}
        run: |
          set +e
          # Menggunakan printf agar format TAB dan baris baru pada Netscape Cookie tetap terjaga sempurna di server
          printf "%s\n" "$YT_COOKIES_DATA" > cookies.txt
          
          LOGO_FILE="logoihyajuni2026.mp4"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "ERROR: File $LOGO_FILE tidak ditemukan!"
            ls
            exit 1
          fi
          
          while true; do
            echo "--- [$(date)] Mengambil Direct Link Audio YouTube ---"
            
            # Menggunakan player_client=ios yang lebih toleran terhadap IP Cloud dan membuka penutup error (menghapus 2>/dev/null)
            AUDIO_STREAM=$(yt-dlp --cookies cookies.txt \
                               --js-runtime node \
                               --force-ipv4 \
                               --no-playlist \
                               --extractor-args "youtube:player_client=ios" \
                               -f "bestaudio/best" \
                               -g "${{ github.event.inputs.audio_url }}")

            if [ -z "$AUDIO_STREAM" ]; then
              echo "Gagal ambil URL Audio dengan client iOS. Mencoba mode fallback web biasa..."
              AUDIO_STREAM=$(yt-dlp --cookies cookies.txt --js-runtime node --extractor-args "youtube:player_client=web" -f "bestaudio" -g "${{ github.event.inputs.audio_url }}")
            fi

            if [ -z "$AUDIO_STREAM" ]; then
              echo "CRITICAL ERROR: Gagal ambil audio. Periksa apakah isi GitHub Secrets YT_COOKIES sudah sesuai format Netscape!"
              sleep 10
              continue
            fi

            echo "SUMBER DITEMUKAN! Menjalankan Trik Buffer Video..."
            ffmpeg -re -i "${{ github.event.inputs.m3u8_url }}" -c copy -f mpegts udp://127.0.0.1:8080?pkt_size=1316 &
            
            sleep 3

            echo "Memulai Pemrosesan Logo & Tarik Paksa Video ke 16:9..."
            
            ffmpeg -re -i "udp://127.0.0.1:8080" \
              -re -i "$AUDIO_STREAM" \
              -stream_loop -1 -i "$LOGO_FILE" \
              -filter_complex \
              "[0:v]scale=1920:1080[cctv_widescreen]; \
               [2:v]colorkey=0x006900:0.1:0.1,scale=iw*0.17:-1[logo]; \
               [cctv_widescreen][logo]overlay=W-w-(W*0.02):(W*0.02)[v_out]" \
              -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
              -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
              -c:a aac -ar 44100 -b:a 128k \
              -map "[v_out]" -map 1:a:0 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.inputs.kunci_rtmp }}" \
              -shortest

            echo "Audio habis atau stream selesai. Mengulang sistem dan me-refresh token dalam 5 detik..."
            killall ffmpeg 2>/dev/null
            sleep 5
          done
